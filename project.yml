name: SlateCue
options:
  bundleIdPrefix: com.philipkiulpekidis
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    PRODUCT_BUNDLE_IDENTIFIER: com.philipkiulpekidis.SlateCue
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  SlateCue:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Domain
      - path: Features
      - path: Services
      - path: UI
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: SlateCue
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: SlateCue
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    info:
      path: App/Info.plist
      properties:
        CFBundleName: SlateCue
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
    scheme:
      testTargets: []
